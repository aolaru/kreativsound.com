<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta http-equiv="refresh" content="0; url=/apps/preset-mutator/ui/" />
    <link rel="canonical" href="https://kreativsound.com/apps/preset-mutator/ui/" />
    <title>Preset Mutator moved</title>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        });
      }

      window.location.replace("/apps/preset-mutator/ui/");
    </script>
  </head>
  <body>
    <p>Preset Mutator has moved to <a href="/apps/preset-mutator/ui/">/apps/preset-mutator/ui/</a>.</p>
  </body>
</html>
